<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamza AI — محلل المشاعر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #181820;
  --border: rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.15);
  --text: #f0eee8;
  --text-muted: #7a7880;
  --text-dim: #44424e;
  --accent: #c8f135;
  --accent-dim: rgba(200,241,53,0.12);
  --accent-glow: rgba(200,241,53,0.25);
  --pos: #4ade80;
  --pos-bg: rgba(74,222,128,0.08);
  --neg: #f87171;
  --neg-bg: rgba(248,113,113,0.08);
  --neu: #94a3b8;
  --neu-bg: rgba(148,163,184,0.08);
  --font-ar: 'IBM Plex Sans Arabic', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 32px 64px rgba(0,0,0,0.6);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-ar);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px 48px;
  position: relative;
  overflow-x: hidden;
}

/* Background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(200,241,53,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,241,53,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* Radial glow background */
body::after {
  content: '';
  position: fixed;
  top: -20%;
  right: -10%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(200,241,53,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  width: 100%;
  max-width: 680px;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  text-align: center;
  margin-bottom: 40px;
  animation: fadeDown 0.6s ease both;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent-dim);
  border: 1px solid rgba(200,241,53,0.3);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  padding: 5px 14px;
  border-radius: 99px;
  margin-bottom: 20px;
  text-transform: uppercase;
}

.badge-dot {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 2s ease infinite;
}

h1 {
  font-size: clamp(28px, 5vw, 44px);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: var(--text);
}

h1 span {
  color: var(--accent);
}

.subtitle {
  font-size: 15px;
  color: var(--text-muted);
  margin-top: 10px;
  font-weight: 300;
  line-height: 1.6;
}

/* ── Main Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  animation: fadeUp 0.7s ease 0.1s both;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
}

/* ── Textarea ── */
.input-wrap {
  position: relative;
  margin-bottom: 20px;
}

.input-label {
  display: block;
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  min-height: 140px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  font-family: var(--font-ar);
  font-size: 16px;
  font-weight: 400;
  color: var(--text);
  line-height: 1.7;
  resize: none;
  outline: none;
  transition: border-color 0.25s, box-shadow 0.25s;
  caret-color: var(--accent);
}

textarea::placeholder {
  color: var(--text-dim);
}

textarea:focus {
  border-color: rgba(200,241,53,0.4);
  box-shadow: 0 0 0 3px rgba(200,241,53,0.08);
}

.char-count {
  position: absolute;
  bottom: 12px;
  left: 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  direction: ltr;
}

/* ── Button ── */
.btn {
  width: 100%;
  background: var(--accent);
  color: #0a0a0f;
  border: none;
  padding: 15px 24px;
  border-radius: var(--radius-sm);
  font-family: var(--font-ar);
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  letter-spacing: -0.01em;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.2s;
}

.btn:hover::before { background: rgba(255,255,255,0.12); }
.btn:active { transform: scale(0.985); }

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-icon {
  font-size: 20px;
  transition: transform 0.2s;
}

.btn:hover .btn-icon { transform: rotate(-15deg); }

/* ── Loading ── */
.loading-state {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 28px 0 12px;
  color: var(--text-muted);
  font-size: 14px;
}

.loading-state.active { display: flex; }

.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-bright);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

.loading-dots span {
  display: inline-block;
  width: 5px;
  height: 5px;
  background: var(--accent);
  border-radius: 50%;
  animation: dots 1.2s ease infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

/* ── Result Section ── */
#result {
  display: none;
  margin-top: 28px;
  animation: fadeUp 0.5s ease both;
}

#result.visible { display: block; }

.divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 24px;
}

/* ── Sentiment Banner ── */
.sentiment-banner {
  border-radius: var(--radius-sm);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  transition: all 0.4s ease;
  border: 1px solid transparent;
}

.sentiment-banner.Positive {
  background: var(--pos-bg);
  border-color: rgba(74,222,128,0.2);
}

.sentiment-banner.Negative {
  background: var(--neg-bg);
  border-color: rgba(248,113,113,0.2);
}

.sentiment-banner.Neutral {
  background: var(--neu-bg);
  border-color: rgba(148,163,184,0.15);
}

.banner-label {
  font-size: 11px;
  font-family: var(--font-mono);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.banner-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.banner-value.Positive { color: var(--pos); }
.banner-value.Negative { color: var(--neg); }
.banner-value.Neutral  { color: var(--neu); }

.banner-emoji {
  font-size: 40px;
  line-height: 1;
}

/* ── Score Bar ── */
.score-section {
  margin-bottom: 20px;
}

.score-label-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}

.score-label {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.score-value {
  font-size: 13px;
  font-family: var(--font-mono);
  color: var(--text);
  font-weight: 700;
}

.bar-track {
  height: 6px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
  position: relative;
  border: 1px solid var(--border);
}

.bar-fill {
  height: 100%;
  border-radius: 99px;
  width: 0%;
  transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
}

.bar-fill.Positive { background: var(--pos); }
.bar-fill.Negative { background: var(--neg); }
.bar-fill.Neutral  { background: var(--neu); }

/* ── Stats Grid ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.stat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  text-align: center;
  transition: border-color 0.2s;
}

.stat-box:hover {
  border-color: var(--border-bright);
}

.stat-name {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.stat-num {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  font-family: var(--font-mono);
}

.stat-num.pos { color: var(--pos); }
.stat-num.neg { color: var(--neg); }
.stat-num.net { color: var(--accent); }

/* ── Keywords ── */
.keywords-section {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  margin-bottom: 20px;
}

.kw-label {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.kw-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.kw-tag {
  font-size: 13px;
  padding: 4px 12px;
  border-radius: 99px;
  font-family: var(--font-ar);
  border: 1px solid;
  animation: popIn 0.3s ease both;
}

.kw-tag.pos { background: var(--pos-bg); color: var(--pos); border-color: rgba(74,222,128,0.25); }
.kw-tag.neg { background: var(--neg-bg); color: var(--neg); border-color: rgba(248,113,113,0.25); }

.kw-empty {
  color: var(--text-dim);
  font-size: 13px;
  font-style: italic;
}

/* ── Confidence Bar ── */
.confidence-section {
  display: flex;
  align-items: center;
  gap: 14px;
}

.conf-label {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  white-space: nowrap;
  min-width: 70px;
}

.conf-pips {
  display: flex;
  gap: 5px;
  flex: 1;
}

.conf-pip {
  height: 8px;
  flex: 1;
  border-radius: 99px;
  background: var(--surface2);
  border: 1px solid var(--border);
  transition: background 0.4s ease;
}

.conf-pip.filled { background: var(--accent); border-color: var(--accent); }

.conf-text {
  font-size: 12px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  min-width: 50px;
  text-align: left;
}

/* ── Footer ── */
.footer {
  text-align: center;
  margin-top: 32px;
  font-size: 12px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
  animation: fadeUp 0.8s ease 0.3s both;
}

.footer strong {
  color: var(--text-muted);
}

/* ── Error Toast ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface2);
  border: 1px solid rgba(248,113,113,0.3);
  color: var(--neg);
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font-ar);
  white-space: nowrap;
  z-index: 99;
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-14px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}

@keyframes dots {
  0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
  40%            { transform: scale(1); opacity: 1; }
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.85); }
  to   { opacity: 1; transform: scale(1); }
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .card { padding: 22px 18px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  h1 { font-size: 26px; }
  .banner-value { font-size: 22px; }
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="badge">
      <span class="badge-dot"></span>
      Hamza AI Engine v2.0
    </div>
    <h1>محلل <span>المشاعر</span> الذكي</h1>
    <p class="subtitle">تحليل النص العربي والإنجليزي بدقة عالية<br></p>
  </div>

  <!-- Card -->
  <div class="card">
    <label class="input-label" for="inputText">// أدخل النص للتحليل</label>
    <div class="input-wrap">
      <textarea
        id="inputText"
        placeholder="اكتب جملتك هنا… مثال: الخدمة ممتازة جداً وسريعة، شكراً جزيلاً!"
        oninput="updateChar()"
        onkeydown="handleKey(event)"
      ></textarea>
      <span class="char-count" id="charCount">0 / 500</span>
    </div>

    <button class="btn" id="btn" onclick="analyzeText()">
      <span class="btn-icon">⚡</span>
      تحليل المشاعر
    </button>

    <!-- Loading -->
    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <span>جاري المعالجة...</span>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Result -->
    <div id="result">
      <div class="divider"></div>

      <!-- Banner -->
      <div class="sentiment-banner" id="sentimentBanner">
        <div>
          <div class="banner-label">// النتيجة النهائية</div>
          <div class="banner-value" id="bannerValue">—</div>
        </div>
        <div class="banner-emoji" id="bannerEmoji">🔍</div>
      </div>

      <!-- Score Bar -->
      <div class="score-section">
        <div class="score-label-row">
          <span class="score-label">// مقياس المشاعر</span>
          <span class="score-value" id="scoreDisplay">0</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="barFill"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-name">إيجابي</div>
          <div class="stat-num pos" id="statPos">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-name">سلبي</div>
          <div class="stat-num neg" id="statNeg">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-name">صافي</div>
          <div class="stat-num net" id="statNet">0</div>
        </div>
      </div>

      <!-- Keywords -->
      <div class="keywords-section">
        <div class="kw-label">// الكلمات المكتشفة</div>
        <div class="kw-tags" id="kwTags"></div>
      </div>

      <!-- Confidence -->
      <div class="confidence-section">
        <span class="conf-label">// الثقة</span>
        <div class="conf-pips" id="confPips">
          <div class="conf-pip"></div>
          <div class="conf-pip"></div>
          <div class="conf-pip"></div>
          <div class="conf-pip"></div>
          <div class="conf-pip"></div>
        </div>
        <span class="conf-text" id="confText">—</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <strong>iSolutions API</strong> · Powered by Hamza's Hybrid AI Engine · 2025
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">⚠ <span id="toastMsg"></span></div>

<script>
// ── Char Counter ──
function updateChar() {
  const t = document.getElementById('inputText');
  const c = t.value.length;
  document.getElementById('charCount').textContent = c + ' / 500';
  if (c > 500) t.value = t.value.slice(0, 500);
}

// Ctrl+Enter to analyze
function handleKey(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyzeText();
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── Main Analyze ──
async function analyzeText() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showToast('الرجاء إدخال نص للتحليل'); return; }

  const btn        = document.getElementById('btn');
  const loading    = document.getElementById('loading');
  const resultDiv  = document.getElementById('result');

  btn.disabled = true;
  loading.classList.add('active');
  resultDiv.classList.remove('visible');

  const myHeaders = new Headers();
  myHeaders.append("Content-Type", "application/json");
  myHeaders.append("x-apikey", "fzXhoJL9X8Ov4tGcKp61c01hcbRZefi9eRbcS7l6GbLIFJAQ");

  try {
    const response = await fetch("https://api-dev-isolution.xyz/v1/ai", {
      method: 'POST',
      headers: myHeaders,
      body: JSON.stringify({ text }),
      redirect: 'follow'
    });

    if (!response.ok) throw new Error('HTTP ' + response.status);

    const data = await response.json();
    const a    = data.analysis_result;
    const d    = data.deep_analysis;

    renderResult({
      sentiment : a.sentiment,
      confidence: a.confidence,
      score     : parseInt(a.overall_score) || 0,
      posScore  : parseInt(d.pos_score)     || 0,
      negScore  : parseInt(d.neg_score)     || 0,
      keywords  : d.detected_keywords       || ''
    });

  } catch (err) {
    console.error(err);
    showToast('خطأ في الاتصال — تأكد من تشغيل CORS والـ API Key');
  } finally {
    btn.disabled = false;
    loading.classList.remove('active');
  }
}

// ── Render Result ──
function renderResult({ sentiment, confidence, score, posScore, negScore, keywords }) {
  const resultDiv = document.getElementById('result');
  resultDiv.classList.add('visible');

  // Emoji map
  const emojiMap = { Positive: '😊', Negative: '😞', Neutral: '😐' };
  const labelMap = { Positive: 'إيجابي', Negative: 'سلبي', Neutral: 'محايد' };

  // Banner
  const banner = document.getElementById('sentimentBanner');
  banner.className = 'sentiment-banner ' + sentiment;
  document.getElementById('bannerValue').textContent = labelMap[sentiment] || sentiment;
  document.getElementById('bannerValue').className   = 'banner-value ' + sentiment;
  document.getElementById('bannerEmoji').textContent = emojiMap[sentiment] || '🔍';

  // Score bar
  document.getElementById('scoreDisplay').textContent = (score >= 0 ? '+' : '') + score;
  const bar = document.getElementById('barFill');
  bar.className = 'bar-fill ' + sentiment;
  const total = posScore + negScore;
  const pct   = total > 0 ? Math.round((Math.max(posScore, negScore) / total) * 100) : 50;
  setTimeout(() => { bar.style.width = pct + '%'; }, 50);

  // Stats
  document.getElementById('statPos').textContent = '+' + posScore;
  document.getElementById('statNeg').textContent = '-' + negScore;
  const net = posScore - negScore;
  document.getElementById('statNet').textContent = (net >= 0 ? '+' : '') + net;

  // Keywords
  const tagsEl = document.getElementById('kwTags');
  tagsEl.innerHTML = '';
  if (keywords) {
    const items = keywords.split(',').map(s => s.trim()).filter(Boolean);
    if (items.length) {
      items.forEach((word, i) => {
        const tag = document.createElement('span');
        const cls = sentiment === 'Positive' ? 'pos' : sentiment === 'Negative' ? 'neg' : 'pos';
        tag.className = 'kw-tag ' + cls;
        tag.style.animationDelay = (i * 0.06) + 's';
        tag.textContent = word;
        tagsEl.appendChild(tag);
      });
    } else {
      tagsEl.innerHTML = '<span class="kw-empty">لم يتم اكتشاف كلمات مفتاحية</span>';
    }
  } else {
    tagsEl.innerHTML = '<span class="kw-empty">لم يتم اكتشاف كلمات مفتاحية</span>';
  }

  // Confidence pips
  const confMap = { 'High': 5, 'Medium': 3, 'Low': 1, 'N/A': 0 };
  const confLabelAr = { 'High': 'عالية', 'Medium': 'متوسطة', 'Low': 'منخفضة', 'N/A': 'غير محدد' };
  const filled = confMap[confidence] ?? 0;
  const pips   = document.querySelectorAll('.conf-pip');
  pips.forEach((p, i) => {
    p.classList.toggle('filled', i < filled);
  });
  document.getElementById('confText').textContent = confLabelAr[confidence] || confidence;
}
</script>
</body>
</html>
